<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
    <title>WayFable</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="Plane und verwalte deine Reisen gemeinsam — Routen, Budgets, Unterkünfte und mehr. Alles an einem Ort." />
    <link rel="canonical" href="https://wayfable.ch/" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B6B" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WayFable" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      /* Prevent iOS auto-zoom on input focus (triggers at font-size < 16px) */
      input, textarea, select {
        font-size: 16px !important;
      }
      /* Crawler-visible footer hidden when JS renders the app */
      #crawler-footer {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 16px;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: #636E72;
        background: #F8F9FA;
        z-index: -1;
      }
      #crawler-footer a {
        color: #4ECDC4;
        margin: 0 8px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <noscript>
      <h1>WayFable — Dein Reisebegleiter</h1>
      <p>Plane und verwalte deine Reisen gemeinsam — Routen, Budgets, Unterkünfte und mehr.</p>
      <nav>
        <a href="https://wayfable.ch/datenschutz">Datenschutzerklärung</a> |
        <a href="https://wayfable.ch/agb">AGB</a> |
        <a href="https://wayfable.ch/impressum">Impressum</a>
      </nav>
    </noscript>
    <div id="root">
      <div id="app-loader" style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F8F9FA;">
        <img src="/icon-192.png" alt="WayFable" width="80" height="80" style="border-radius:20px;margin-bottom:24px;" />
        <div style="width:40px;height:40px;border:3px solid #DFE6E9;border-top-color:#FF6B6B;border-radius:50%;animation:spin .8s linear infinite;"></div>
        <p id="offline-msg" style="display:none;margin-top:24px;color:#636E72;font-size:14px;text-align:center;padding:0 32px;">
          Du bist offline. Einige Funktionen sind eingeschraenkt verfuegbar.
        </p>
      </div>
    </div>

    <!--
      Crawler-visible footer: Google's crawler sees this even without JS.
      The React app covers it once mounted (z-index: -1).
    -->
    <div id="crawler-footer">
      <a href="https://wayfable.ch/">WayFable</a> —
      <a href="https://wayfable.ch/datenschutz">Datenschutzerklärung</a> ·
      <a href="https://wayfable.ch/agb">AGB</a> ·
      <a href="https://wayfable.ch/impressum">Impressum</a>
      <br />© 2026 Gabriel Sommer. Alle Rechte vorbehalten.
    </div>

    <!-- SW registration handled by useServiceWorkerUpdate hook -->
    <script>
      if (!navigator.onLine) {
        var m = document.getElementById('offline-msg');
        if (m) m.style.display = 'block';
      }
    </script>
  </body>
</html>
